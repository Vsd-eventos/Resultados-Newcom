<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSD Eventos - Torneo de Newcom</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES DE COLOR Y DISEÑO (NEWCOM VIBES) --- */
        :root {
            --color-principal: #0284c7; /* Azul cian moderno */
            --color-secundario: #0f172a; /* Azul oscuro/pizarra profundo */
            --color-acento: #f97316; /* Naranja enérgico para detalles */
            --color-blanco: #ffffff;
            --color-gris-fondo: #f8fafc; /* Fondo suave tirando a azul claro */
            --color-gris-linea: #e2e8f0;
            --fuente-titulos: 'Montserrat', sans-serif;
            --fuente-cuerpo: 'Open Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--fuente-cuerpo);
            background-color: var(--color-gris-fondo);
            color: var(--color-secundario);
            padding-bottom: 50px;
            line-height: 1.5;
        }

        /* --- ENCABEZADO REESTILIZADO --- */
        header {
            background: linear-gradient(135deg, var(--color-secundario) 0%, #1e293b 100%);
            color: var(--color-blanco);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--color-principal), var(--color-acento));
        }

        header h1 {
            font-family: var(--fuente-titulos);
            font-weight: 800;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        header h1 span.acento {
            color: var(--color-principal);
        }
        
        header p {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- ESTADO DE CONEXIÓN --- */
        #estado {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin: 25px 0;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #estado.cargando {
            color: var(--color-acento);
            animation: pulso 1.5s infinite ease-in-out;
        }

        @keyframes pulso {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* CARD DE LA TABLA */
        .tabla-card {
            background-color: var(--color-blanco);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            overflow: hidden;
            border: 1px solid var(--color-gris-linea);
        }

        /* RESPONSIVIDAD OPTIMIZADA */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
        }

        /* --- ESTILOS DE LA TABLA --- */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px; /* Previene deformación en pantallas medianas */
        }

        thead {
            background-color: #f1f5f9;
        }

        th {
            padding: 18px 20px;
            text-align: left;
            font-family: var(--fuente-titulos);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--color-secundario);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--color-gris-linea);
        }

        tbody tr {
            border-bottom: 1px solid var(--color-gris-linea);
            transition: all 0.2s ease;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tbody tr:hover {
            background-color: #f0fdf4; /* Tono verde/salud muy sutil al pasar el mouse */
            transform: scale(1.002);
        }

        td {
            padding: 16px 20px;
            color: #334155;
            font-size: 0.95rem;
        }

        /* Destacar la primera columna con los nombres de equipos */
        td:first-child {
            font-weight: 600;
            color: var(--color-secundario);
        }

        /* Adaptación extra para pantallas muy pequeñas */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6rem;
            }
            header p {
                font-size: 0.8rem;
            }
            td, th {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>VSD Eventos <span class="acento">Newcom</span></h1>
        <p>Tabla de Posiciones y Resultados</p>
    </header>

    <div class="main-container">
        <div id="estado" class="cargando">🔄 Iniciando conexión con el servidor...</div>

        <div class="tabla-card">
            <div class="table-responsive">
                <table id="tabla-resultados">
                    <thead>
                        <tr id="headers">
                            </tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyCvzkk9FjoS25dg90_avWXvwnHt5NiQCI8UeWcG7WT60-wUcGOKIR50AJJkZCCkgS00Q/exec'; 
        const TIEMPO_REFRESCO_MS = 60000; // 1 minuto

        async function cargarDatos() {
            const divEstado = document.getElementById('estado');
            const headersRow = document.getElementById('headers');
            const cuerpoTabla = document.getElementById('cuerpo-tabla');

            try {
                const response = await fetch(WEB_APP_URL);
                const datos = await response.json();
                
                if (!datos || datos.length === 0) {
                    divEstado.textContent = '⚠️ No hay datos disponibles en la hoja de Newcom.';
                    divEstado.classList.remove('cargando');
                    return;
                }

                // Limpiar contenido previo
                headersRow.innerHTML = '';
                cuerpoTabla.innerHTML = '';

                // 1. Crear encabezados dinámicamente (saltando las primeras 2 columnas según tu script original)
                const encabezados = Object.keys(datos[0]).slice(2);
                encabezados.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headersRow.appendChild(th);
                });

                // 2. Crear filas dinámicamente
                datos.forEach(fila => {
                    const tr = document.createElement('tr');
                    encabezados.forEach(header => {
                        const td = document.createElement('td');
                        td.textContent = fila[header] !== "" ? fila[header] : "-";
                        td.setAttribute('data-label', header); 
                        tr.appendChild(td);
                    });
                    cuerpoTabla.appendChild(tr);
                });

                // Mostrar última actualización con formato amigable
                divEstado.textContent = '✅ Actualizado a las: ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                divEstado.classList.remove('cargando');

            } catch (error) {
                divEstado.textContent = '❌ Error de conexión. Reintentando automáticamente...';
                divEstado.classList.remove('cargando');
                console.error('Error:', error);
            }
        }

        // Ejecuciones automáticas
        cargarDatos();
        setInterval(cargarDatos, TIEMPO_REFRESCO_MS);
    </script>
</body>
</html>
